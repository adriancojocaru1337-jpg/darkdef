<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Dark Defense</title>
  <meta name="description" content="Choose a new password for your Dark Defense account." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="/crest.js"></script>
  <script src="/account-bar.js" defer></script>
  <style>
    .reset-shell{max-width:720px;margin:0 auto;padding:24px}
    .reset-card{padding:28px;border-radius:30px;background:linear-gradient(180deg, rgba(14,25,43,.94), rgba(8,17,31,.96))}
    .reset-card h1{margin:8px 0 12px;font-size:clamp(32px,4vw,48px)}
    .reset-card p{margin:0 0 18px;color:var(--muted);line-height:1.7}
    .reset-form{display:grid;gap:14px}
    .field{display:grid;gap:8px}
    .field label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#93c5fd;font-weight:800}
    .field input{width:100%;padding:15px 16px;border-radius:16px;border:1px solid rgba(148,163,184,.14);background:rgba(8,17,31,.78);color:#f8fafc;font-size:15px;outline:none}
    .field input:focus{border-color:rgba(56,189,248,.34);box-shadow:0 0 0 4px rgba(56,189,248,.08)}
    .reset-status{margin-top:16px;padding:14px 16px;border-radius:16px;border:1px solid rgba(148,163,184,.12);background:rgba(8,17,31,.64);color:#dbeafe;display:none}
    .reset-status.visible{display:block}
    .reset-status.error{border-color:rgba(251,113,133,.22);color:#ffe4e6;background:rgba(68,18,28,.45)}
    .reset-status.success{border-color:rgba(34,197,94,.24);color:#dcfce7;background:rgba(8,48,28,.45)}
    .reset-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
  </style>
</head>
<body>
  <main class="reset-shell">
    <section class="glass reset-card">
      <div class="panel-kicker">Password reset</div>
      <h1>Choose a new password</h1>
      <p>Enter a new password for your Dark Defense account. For security, this reset link can only be used once.</p>
      <form id="resetForm" class="reset-form">
        <div class="field">
          <label for="newPassword">New password</label>
          <input id="newPassword" name="password" type="password" minlength="8" maxlength="72" autocomplete="new-password" placeholder="At least 8 characters" required />
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" maxlength="72" autocomplete="new-password" placeholder="Repeat your password" required />
        </div>
        <button class="btn btn-primary" type="submit">Update password</button>
      </form>
      <div id="resetStatus" class="reset-status"></div>
      <div class="reset-actions">
        <a href="/account.html" class="btn btn-secondary">Back to Account</a>
        <a href="/" class="btn btn-secondary">Back to Game</a>
      </div>
    </section>
  </main>
  <footer class="site-footer">Copyright © 2026 Adrian Cojocaru. All rights reserved.</footer>
  <script>
    const form = document.getElementById('resetForm');
    const statusEl = document.getElementById('resetStatus');
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    function showStatus(message, tone = 'error') {
      statusEl.textContent = message;
      statusEl.className = `reset-status visible ${tone}`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (!token) {
        showStatus('This reset link is missing a token.');
        return;
      }
      if (password !== confirmPassword) {
        showStatus('Passwords do not match.');
        return;
      }
      try {
        const response = await fetch('/.netlify/functions/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json();
        if (!response.ok) {
          showStatus(data.error || 'Failed to reset password.');
          return;
        }
        form.reset();
        showStatus(data.message || 'Password updated. You can sign in now.', 'success');
      } catch (_) {
        showStatus('Network error while resetting password.');
      }
    });
  </script>
</body>
</html>
